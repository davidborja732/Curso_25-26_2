<!DOCTYPE html>
<!--Realiza un formulario que pida una dirección de email y la valide antes de enviarla:
Ejer 2-a) Debe validar si el email sigue el formato texto@servidor.loquesea
Ejer 2-b) Además de validar el formato anterior, debe comprobar que servidor.loquesea
este como servidor admitido en un array de servidores llamado “listaServidores”.
Dicho array debe ser definido a mano en el código.
Ejemplo
listaServidores=[“terra.es”,”google.com”,”marca.es”,”yahoo.es”];-->
<html>
    <head>
        <script>
        // Función que valida el formato del email y el servidor
        // Retorna: true si el email es válido y el servidor está en la lista, false en caso contrario
        function comprobar(){
            // Array con los servidores de email permitidos
            var servidores = ["terra.es", "google.com", "marca.es", "yahoo.es"];
            
            // Obtener el elemento input de texto con id "miTexto"
            var t = document.getElementById("miTexto");
            
            // Obtener el valor del input (el email introducido)
            var texto = t.value;
            
            // Extraer solo la parte del servidor (después de la @)
            // indexOf("@") encuentra la posición de @
            // +1 para empezar después de la @
            // substring extrae desde esa posición hasta el final
            // Ejemplo: "usuario@google.com" -> "google.com"
            var soloServidor = texto.substring(texto.indexOf("@") + 1);
            
            // Crear expresión regular para validar formato básico de email
            // .+ : uno o más caracteres (cualquier cosa)
            // [@] : el símbolo arroba obligatorio
            // .+ : uno o más caracteres (nombre del dominio)
            // [.] : un punto obligatorio
            // .+ : uno o más caracteres (extensión del dominio)
            // Ejemplo válido: "usuario@dominio.com"
            var expresionRegular = new RegExp(".+[@].+[.].+");
            
            // Comprobar si el texto NO cumple con el formato de email
            if(!expresionRegular.test(texto)){
                alert("Formato email incorrecto");
                // Retornar false para cancelar el envío del formulario
                return false;
            }
            
            
            // Buscar el servidor en la lista de servidores permitidos
            // Recorrer el array de servidores
            for(i = 0; i < servidores.length; i++){
                // Comparar el servidor extraído con cada servidor de la lista
                if(soloServidor == servidores[i]){
                    // Si coincide, el servidor es válido
                    // Permitir el envío del formulario
                    return true;
                }
            }
            
            // Si el bucle termina sin encontrar el servidor
            alert("Formato correcto, pero servidor no en la lista");
            // El servidor no está en la lista de permitidos
            // Cancelar el envío del formulario
            return false;
        }



        // Evento que se ejecuta cuando se ha cargado completamente la página
        window.onload = function(){
            
            // Obtener el elemento formulario con id "miForm"
            var f = document.getElementById("miForm");
            
            // Asignar la función comprobar al evento onsubmit del formulario
            // Se ejecutará cuando el usuario intente enviar el formulario
            f.onsubmit = comprobar;
        }


        </script>
    </head>
    <body>
                
        <!-- Formulario que se enviará a Google si la validación es correcta -->
        <form id="miForm" action="http://google.es">
            <!-- Etiqueta informativa para el usuario -->
            <p>Introduzca email</p>
            
            <!-- Campo de texto donde se introduce el email -->
            <!-- Tiene un valor por defecto "miemail@servidor.com" para pruebas -->
            <input type="text" id="miTexto" value="miemail@servidor.com"/>
            
            <!-- Botón para enviar el formulario -->
            <input type="submit" />
        </form>
        
    </body>
</html>
