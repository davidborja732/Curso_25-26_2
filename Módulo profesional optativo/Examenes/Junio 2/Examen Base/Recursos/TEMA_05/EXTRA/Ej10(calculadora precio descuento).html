<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicio 10 - Calculadora de Precio</title>
</head>

<body>
    <h2>Calculadora de Precio Final</h2>
    <form id="formPrecio">
        <label>Precio del producto (€):</label><br>
        <input type="text" id="precio" name="precio"><br><br>

        <label>Cantidad:</label><br>
        <input type="text" id="cantidad" name="cantidad"><br><br>

        <label>Código de descuento:</label><br>
        <input type="text" id="codigo" name="codigo" placeholder="Opcional"><br><br>

        <label>
            <input type="checkbox" id="socio" name="socio">
            Soy socio (10% descuento adicional)
        </label><br><br>

        <input type="button" value="Calcular Total" id="btnCalcular">

        <h3>Resultado:</h3>
        <div id="resultado"></div>
    </form>

    <script>
        /*
         Calculadora de precio final con:
         - validación básica de entrada (precio y cantidad)
         - aplicación de código de descuento (porcentaje)
         - descuento adicional por ser socio (10%)

         Notas orientativas:
         - `codigosDescuento` almacena códigos (clave) y su porcentaje (valor).
         - Convertimos el código introducido a mayúsculas y quitamos espacios
           para permitir entradas flexibles del usuario.
         - El descuento de socio se aplica sobre el subtotal restante después
           de aplicar el descuento por código (orden: código primero, socio después).
         - Las validaciones del cliente son para UX; siempre validar en servidor.
        */

        // Códigos de descuento válidos (clave: porcentaje)
        var codigosDescuento = {
            "VERANO2025": 15,
            "PRIMERACOMPRA": 20,
            "DESCUENTO10": 10
        };

        // Obtener referencias a los elementos del DOM (cached references)
        var btnCalcular = document.getElementById("btnCalcular");
        var precio = document.getElementById("precio");
        var cantidad = document.getElementById("cantidad");
        var codigo = document.getElementById("codigo");
        var socio = document.getElementById("socio");
        var resultado = document.getElementById("resultado");

        // Asociamos el evento click al botón que lanza el cálculo
        btnCalcular.addEventListener("click", calcularPrecio);

        // Función principal que valida entradas y calcula el total
        function calcularPrecio() {
            // --- Validación de entradas ---
            // parseFloat permite decimales (precio puede ser 12.99)
            var precioValor = parseFloat(precio.value);
            if (isNaN(precioValor) || precioValor <= 0) {
                alert("Introduce un precio válido");
                return; // detenemos la ejecución si el precio no es válido
            }

            // parseInt para cantidad (nº de unidades). Si necesitas validar
            // fracciones (p. ej. peso), usar parseFloat también.
            var cantidadValor = parseInt(cantidad.value);
            if (isNaN(cantidadValor) || cantidadValor <= 0) {
                alert("Introduce una cantidad válida");
                return;
            }

            // --- Cálculos ---
            // Subtotal = precio * cantidad
            var subtotal = precioValor * cantidadValor;
            // descuentoTotal acumulará el importe absoluto (en euros) descontado
            var descuentoTotal = 0;
            var html = "";

            // Mostrar subtotal con 2 decimales
            html += "<p><b>Subtotal:</b> " + subtotal.toFixed(2) + " €</p>";

            // --- Aplicar código de descuento (si el usuario introdujo uno) ---
            // Normalizamos: quitamos espacios y pasamos a mayúsculas
            var codigoIngresado = codigo.value.trim().toUpperCase();
            if (codigoIngresado !== "") {
                // Si el código existe en nuestro objeto, aplicamos el porcentaje
                if (codigosDescuento[codigoIngresado]) {
                    var descuentoCodigo = codigosDescuento[codigoIngresado];
                    // Calculamos el monto del descuento en euros (porcentaje del subtotal)
                    var montoDescuento = subtotal * (descuentoCodigo / 100);
                    descuentoTotal += montoDescuento;
                    html += "<p><b>Descuento (" + codigoIngresado + "):</b> -" + montoDescuento.toFixed(2) + " € (" + descuentoCodigo + "%)</p>";
                } else {
                    // El código no es válido: avisamos, pero no bloqueamos el cálculo
                    html += "<p style='color:red'>Código de descuento no válido</p>";
                }
            }

            // --- Aplicar descuento de socio ---
            // Si es socio, aplicamos un 10% sobre el importe restante (subtotal - descuentos previos)
            if (socio.checked) {
                var descuentoSocio = (subtotal - descuentoTotal) * 0.10;
                descuentoTotal += descuentoSocio;
                html += "<p><b>Descuento Socio:</b> -" + descuentoSocio.toFixed(2) + " € (10%)</p>";
            }

            // --- Total final ---
            var total = subtotal - descuentoTotal;
            // Seguridad: evitar total negativo en caso de descuentos excesivos
            if (total < 0) {
                total = 0;
            }

            html += "<hr>";
            html += "<h3 style='color:green'>TOTAL A PAGAR: " + total.toFixed(2) + " €</h3>";

            // Insertar el HTML final en el DOM
            resultado.innerHTML = html;
        }
    </script>
</body>

</html>
