<!DOCTYPE html>
<html lang="es">
  <!--Crea una página web que muestre una lista de personajes de Rick and Morty 
  y permita ver más detalles al hacer clic en cada uno. La dirección para descargar 
  los datos es: https://rickandmortyapi.com/api/character En la llamada nos muestra los 20 per-sonajes. 
  El json que devuelve tiene el siguiente format. No es necesario implementar los estilos-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rick and Morty API - Práctica Fetch</title>
  <style>
    /* Estilos generales del cuerpo de la página */
    body {
      font-family: Arial, sans-serif;
      background-color: #202329; /* Color de fondo oscuro */
      color: #fff; /* Texto blanco */
      margin: 0;
      padding: 20px;
    }
    /* Estilo del título principal */
    h1 {
      text-align: center;
      color: #00b5cc; /* Color cyan característico de Rick and Morty */
    }
    /* Contenedor principal de las tarjetas de personajes */
    #characters {
      display: flex; /* Diseño flexible */
      flex-wrap: wrap; /* Permite múltiples filas */
      justify-content: center; /* Centrar tarjetas */
      gap: 20px; /* Espacio entre tarjetas */
    }
    /* Estilos de cada tarjeta de personaje */
    .card {
      background-color: #2c2f36; /* Fondo gris oscuro */
      border-radius: 10px; /* Esquinas redondeadas */
      overflow: hidden; /* Ocultar contenido que sobresalga */
      width: 200px; /* Ancho fijo */
      cursor: pointer; /* Cursor de mano al pasar por encima */
      box-shadow: 0 0 5px rgba(0,0,0,0.3); /* Sombra suave */
      transition: transform 0.2s; /* Animación suave */
    }
    /* Efecto hover al pasar el mouse sobre la tarjeta */
    .card:hover {
      transform: scale(1.05); /* Aumentar tamaño 5% */
    }
    /* Estilos de las imágenes dentro de las tarjetas */
    .card img {
      width: 100%; /* Ocupar todo el ancho */
      height: 200px; /* Altura fija */
      object-fit: cover; /* Recortar imagen manteniendo proporciones */
    }
    /* Estilo del nombre del personaje en la tarjeta */
    .card h3 {
      text-align: center;
      margin: 10px 0;
    }
    /* Contenedor de detalles del personaje seleccionado */
    #details {
      margin-top: 30px;
      padding: 20px;
      background: #2c2f36;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <h1>Personajes de Rick and Morty</h1>
  <div id="characters"></div>
  <div id="details"></div>


  <script>
    // URL base de la API de Rick and Morty
    const apiURL = "https://rickandmortyapi.com/api/character";


    // Realizar petición HTTP a la API para obtener personajes
    fetch(apiURL)
      .then(response => {
        // Verificar si la respuesta HTTP es exitosa
        if (!response.ok) throw new Error("Error al cargar los personajes");
        
        // Convertir la respuesta a formato JSON
        return response.json();
      })
      .then(data => {
        // Extraer el array de personajes del objeto de respuesta
        const personajes = data.results;
        
        // Obtener el contenedor donde se mostrarán las tarjetas
        const container = document.getElementById("characters");


        // Iterar sobre cada personaje para crear su tarjeta
        personajes.forEach(personaje => {
          // Crear el elemento div que será la tarjeta
          const card = document.createElement("div");
          
          // Asignar la clase CSS "card" al div
          card.className = "card";


          // Crear el elemento de imagen del personaje
          const img = document.createElement("img");
          
          // Establecer la URL de la imagen desde los datos de la API
          img.src = personaje.image;
          
          // Establecer texto alternativo para accesibilidad
          img.alt = personaje.name;


          // Crear el elemento h3 para el nombre del personaje
          const name = document.createElement("h3");
          
          // Establecer el nombre del personaje como contenido
          name.textContent = personaje.name;


          // Añadir la imagen a la tarjeta
          card.appendChild(img);
          
          // Añadir el nombre a la tarjeta
          card.appendChild(name);
          
          // Añadir evento click a la tarjeta
          // Al hacer clic, muestra los detalles del personaje
          card.addEventListener("click", () => showDetails(personaje));


          // Insertar la tarjeta completa en el contenedor principal
          container.appendChild(card);
        });
      })
      .catch(error => console.error(error)); // Capturar y mostrar errores en consola


    // Función que muestra los detalles completos de un personaje seleccionado
    // Parámetro: character - objeto con toda la información del personaje
    function showDetails(character) {
      // Obtener el contenedor de detalles
      const details = document.getElementById("details");
      
      // Limpiar los detalles del personaje anterior
      details.innerHTML = "";


      // Crear título con el nombre del personaje
      const title = document.createElement("h2");
      title.textContent = character.name;


      // Crear elemento de imagen para los detalles
      const img = document.createElement("img");
      img.src = character.image; // URL de la imagen
      img.alt = character.name; // Texto alternativo
      img.style.width = "150px"; // Ancho de 150 píxeles
      img.style.borderRadius = "10px"; // Esquinas redondeadas


      // Crear párrafo con el estado del personaje (vivo, muerto, desconocido)
      const p1 = document.createElement("p");
      p1.innerHTML = "<strong>Estado:</strong> " + character.status;


      // Crear párrafo con la especie del personaje (humano, alien, etc.)
      const p2 = document.createElement("p");
      p2.innerHTML = "<strong>Especie:</strong> " + character.species;


      // Crear párrafo con el género del personaje
      const p3 = document.createElement("p");
      p3.innerHTML = "<strong>Género:</strong> " + character.gender;


      // Crear párrafo con el origen del personaje
      // character.origin es un objeto, accedemos a su propiedad name
      const p4 = document.createElement("p");
      p4.innerHTML = "<strong>Origen:</strong> " + character.origin.name;


      // Añadir todos los elementos al contenedor de detalles en orden
      details.appendChild(title); // Título
      details.appendChild(img); // Imagen
      details.appendChild(p1); // Estado
      details.appendChild(p2); // Especie
      details.appendChild(p3); // Género
      details.appendChild(p4); // Origen
    }
  </script>
</body>
</html>
