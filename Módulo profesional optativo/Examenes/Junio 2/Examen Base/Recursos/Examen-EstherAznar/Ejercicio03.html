<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mostrar socios APIREST</title>
<style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 60%; }
    th, td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: left;
    }
    th { background: #f0f0f0; }
    .seleccionado {background-color: yellow; }
</style>
</head>
<body>

<h2>Socios</h2>

<!-- Botones de acciones -->
<button onclick="añadirSocio()">POST - Añadir Socio</button>
<button onclick="mostrarSocio()">GET - Obtener Socio</button>
<hr>

<!-- Contenedor para la tabla -->
<div id="resultado"></div>

<script>
  // URL de la API (cambiar por la del examen)
  const URL = "http://192.168.50.120:8069/socios/socio"; // API de prueba
  let socio = [];

  // ========================================
  // GET - listar todos los socios
  // ========================================
  function listarSocios() {
    fetch(URL ) 
      .then(response => {
        if (!response.ok) throw new Error("Error al cargar socios");
        return response.json();
      })
      .then(data => {
        socio = data;
        console.log("socios cargadas:", socio);
        mostrarTabla(socio);
      })
      .catch(error => {
        console.error("Error:", error);
        alert("Error al cargar los socios");
      });
  };

  
  

  // ========================================
  // Función para mostrar los socios
  // ========================================
  function mostrarTabla(arr) {
    if (arr.length === 0) {
      document.getElementById("resultado").innerHTML = "<p>No hay socios para mostrar.</p>";
      return;
    }

    let html = `
      <table>
        <tr>
          <th>Dni</th>
          <th>Nombre</th>
          <th>Apellidos</th>
        </tr>
    `;

    arr.forEach(item => {
      html += `
        <tr>
          <td>${item[0]}</td>
          <td>${item[1]}</td>
          <td>${item[2]}</td>
        </tr>
      `;
    });

    html += "</table>";
    document.getElementById("resultado").innerHTML = html;
  }

  // ========================================
  // POST - Crear una nueva socio
  // ========================================
  function añadirSocio() {
    const nombre = prompt("Introduce el nombre del nuevo socio:");
    const apellidos = prompt("Introduce el apellido del socio: ")
    const dni = prompt("Introduce el dni del socio: ")
    
    if (!nombre) {
      alert("Debes introducir un nombre");
      return;
    }
    if (!apellidos) {
      alert("Debes introducir un apellido");
      return;
    }
    if (!dni) {
      alert("Debes introducir un dni");
      return;
    }

    console.log("POST: Creando socio...");

    // Datos de la nueva tarea
    const nuevoSocio = {
      dni: dni,
      nombre: nombre,
      apellidos: apellidos
    };

    fetch('http://192.168.50.120:8069/socio', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(nuevoSocio)
    })
    .then(response => {
      if (!response.ok) throw new Error("Error al crear el socio");
      return response.json();
    })
    .then(data => {
      console.log("socio creada:", data);
      alert("Socio creada correctamente");
      
      // Actualizar la tabla (añadir la nueva tarea)
      socio.unshift(data); // Añadir al inicio
      mostrarTabla(socio);
    })
    .catch(error => {
      console.error("Error:", error);
      alert("Error al crear el socio");
    });
  }

  //OBTENER LOS SOCIOS
  function mostrarSocio(){
    const nombre = prompt("Introduce el nombre del nuevo socio:");

    fetch(URL ) 
      .then(response => {
        if (!response.ok) throw new Error("Error al cargar socios");
        return response.json();
      })
      .then(data => {
        socio = data + dni + nombre + apellidos;
        console.log("socios cargadas:", socio);
        mostrarTabla(socio);
      })
      .catch(error => {
        console.error("Error:", error);
        alert("Error al cargar los socios");
      });
    
    alert("El nombre es " + nombre + "<br>" + " con dni " + dni + "<br>" + "y apellidos" + apellidos);

  }

  // Cargar tareas al inicio
  window.onload = function() {
    listarSocios();
  }
</script>

</body>
</html>
