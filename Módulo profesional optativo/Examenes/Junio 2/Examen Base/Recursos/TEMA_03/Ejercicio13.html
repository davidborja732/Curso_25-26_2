<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio13</title>
</head>
<!--Crea un script que cuando le pases un objeto de tipo Date genere una cadena
con el formato: Día de la semana, dd de mm de aaaa, es decir, jueves, 26 de noviembre de 2015.-->
<body>
    <h1>Ejercicio 13</h1>

    <script>
        // Función que recibe un objeto Date y lo formatea en español
        function formatearFecha(fecha) {
            // Array con los nombres de los meses en español
            // El índice 0 es enero, 1 es febrero, etc.
            var nomMeses = ["enero", "febrero", "marzo", "abril", "mayo", "junio",
            "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"
            ];

            // Array con los nombres de los días de la semana en español
            // El índice 0 es domingo, 1 es lunes, etc.
            var nomDia = ["domingo", "lunes", "martes", "miercoles", "jueves", "viernes", "sabado"]

            // Construye la cadena formateada y la inserta en el elemento con id "result"
            // fecha.getDay() devuelve el día de la semana (0-6)
            // fecha.getDate() devuelve el día del mes (1-31)
            // fecha.getMonth() devuelve el mes (0-11)
            // fecha.getFullYear() devuelve el año completo (4 dígitos)
            document.getElementById("result").innerHTML = nomDia[fecha.getDay()] + ", " + fecha.getDate() + " de " + nomMeses[fecha.getMonth()] + " de " + fecha.getFullYear();
        }

        // Función que obtiene los valores del formulario y crea un objeto Date
        function obtenerFecha() {
            // Obtiene el valor del campo "dia" del formulario
            var dia = document.getElementById("dia").value;
            // Obtiene el valor del campo "mes" del formulario
            var mes = document.getElementById("mes").value;
            // Resta 1 al mes porque JavaScript cuenta los meses desde 0 (enero) hasta 11 (diciembre)
            // Si el usuario ingresa 1 (enero), el Date necesita recibir 0
            mes -= 1;
            // Obtiene el valor del campo "anyo" (año) del formulario
            var anyo = document.getElementById("anyo").value;
            // Crea un nuevo objeto Date con los valores obtenidos
            // El formato es: new Date(año, mes, día)
            var fecha = new Date(anyo,mes,dia);

            // Llama a la función formatearFecha para mostrar la fecha formateada
            formatearFecha(fecha);
        }

    </script>

    <form>
        <br/>
        <p>Inserte la fecha: </p>

        <!-- Campos de entrada para día, mes y año -->
        <!-- size="1" y size="2" controlan el ancho visual del campo -->
        Dia: <input type="text" id="dia" size="1"/> 
        Mes: <input type="text" id="mes" size="1"/> 
        Año: <input type="text" id="anyo" size="2"/><br><br>

        <!-- Botón de envío que ejecuta obtenerFecha() -->
        <!-- return false evita que el formulario se envíe y recargue la página -->
        <input type="submit" value="Enviar" onclick="obtenerFecha(); return false;"/><br><br>

        <!-- Elemento donde se mostrará el resultado formateado -->
        <p id="result"/>
    </form>
</body>
</html>
