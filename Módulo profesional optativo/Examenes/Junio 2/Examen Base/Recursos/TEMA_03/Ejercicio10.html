<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio10</title>
</head>

<!--Crear un script que compruebe una fecha en formato dd-mm-aaaa es correcta.
No uses un objeto Date.-->

<body>
    <h1>Ejercicio 10</h1>
    <script>

        function validarFecha(fecha){
            //Verifico el patron dd-mm-aaa
            const patron = /^\d{2}-\d{2}-\d{4}$/;

            if(!patron.test(fecha)){
                return false;
            }

            //Extraigo el dia mes y año
            const partes = fecha.split('-');
            const dia = parseInt(partes[0], 10);
            const mes = parseInt(partes[1], 10);
            const anio = parseInt(partes[2], 10);

            //Valido los rangos basicos
            if(mes < 1 || mes > 12){
                return false;
            }

            if(dia < 1 || dia > 31){
                return false;
            }

            const diasPorMes = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31]

            //verifico que si es año bisiesto
            const bisiesto = (anio % 400 === 0) || (anio %4 === 0 && anio %100 !== 0);
            if(bisiesto){
                diasPorMes[1] = 29;
            }

            //valido que el dia es valido para el mes
            if(dia > diasPorMes[mes-1]){
                return false;
            }

            return true;
        }

        function slocitarFecha(){
            let fecha = prompt("Introduce una fecha (dd-mm-aaaa)");

            //VErifico si el usuario ha cancelado
            if(fecha === null){
                alert("Operacion cancelada");
                return;
            }
            //Valido si esta vacio
            if(fecha === ""){
                alert("No has ingresado ninguna fecha");
                return;
            }
            //valido la fecha
            if(validarFecha(fecha)){
                alert("LA fecha " + fecha + " es valida");
            }else{
                alert("La fecha " + fecha + " no es valida");
            }
        }
        
        slocitarFecha();

    </script>
</body>
</html>
