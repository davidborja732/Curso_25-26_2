<!DOCTYPE html>

<!--Genera un array con los siguientes nombres: Julián, Rodrigo, Mateo, Valdomero. Haz
una ordenación de los mismos en orden normal e inverso.-->

<body>
    
    <h1>Ejercicio 4</h1>

    <script>

        var array = ["Julián", "Rodrigo", "Mateo", "Valdomero"];

        //Muestro el array original
        console.log("Array original: ", array);

        //Los ordeno alfabeticamente
        var nomordenaods = [...array].sort();
        console.log("Orden alfabetico normal: ", nomordenaods);
        document.writeln("Orden alfabetico normal: " + nomordenaods + "<br><br>");

        //Nombres en orden inverso
        var nomInverso = [...array].sort().reverse();
        console.log("Orden alfabetico inverso: ", nomInverso);
        document.writeln("Orden alfabetico inverso: " + nomInverso);

    </script>

</body>
</html>
