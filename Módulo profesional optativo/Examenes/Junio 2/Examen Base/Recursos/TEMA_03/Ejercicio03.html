<!--Dado el siguiente array: [4,0,3,4,7,3,5,8,1,8,8,0,2,3,1,2,5,7,3,2,5,1]. Genera un nuevo
array con los elementos originales sin repetir y ordenado.-->
<body>
    <h1>Ejercicio 3</h1>

    <script>

        var array = [4,0,3,4,7,3,5,8,1,8,8,0,2,3,1,2,5,7,3,2,5,1];

        //Creo un set para eliminar duplicados
        var conjuntoUnico = new Set(array);
        //Convierto el set de vuelta a array
        var arraysinDuplicados = [...conjuntoUnico];
        //Ordeno el array de menor a mayor
        var arrayOrdenado = arraysinDuplicados.sort((a, b) => a - b);

        console.log("Array original: ", array);
        console.log("Array sin duplicados y ordenados: ", arrayOrdenado);
        document.write("Array sin duplicados y ordenados: " + arrayOrdenado);

    </script>

</body>
</html>
