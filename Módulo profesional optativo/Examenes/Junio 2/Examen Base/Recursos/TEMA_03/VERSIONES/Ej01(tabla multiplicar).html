<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tabla de Multiplicar</title>
</head>
<!--Tabla de Multiplicar Automática-->
<body>
    <h2>Generador de Tabla de Multiplicar</h2>
    <div id="resultado"></div>

    <script>
        // Solicita al usuario que introduzca un número y lo convierte a entero
        let num = parseInt(prompt("Introduce un número (1-10):"));
        
        // Valida que el número esté en el rango permitido (1-10)
        // isNaN() verifica si no es un número válido
        if (isNaN(num) || num < 1 || num > 10) {
            alert("Número no válido");
        } else {
            // Inicializa la cadena HTML con la etiqueta de tabla y borde
            let html = "<table border='1'>";
            // Añade la fila de encabezados (Operación y Resultado)
            html += "<tr><th>Operación</th><th>Resultado</th></tr>";
            
            // Bucle que itera del 1 al 10 para generar la tabla de multiplicar
            for (let i = 1; i <= 10; i++) {
                // Calcula el resultado de la multiplicación
                let resultado = num * i;
                // Añade una fila a la tabla con la operación y su resultado
                // Utiliza template literals (backticks) para interpolar variables
                html += `<tr><td>${num} x ${i}</td><td>${resultado}</td></tr>`;
            }
            
            // Cierra la etiqueta de tabla
            html += "</table>";
            // Inserta el HTML generado en el elemento con id="resultado"
            document.getElementById("resultado").innerHTML = html;
        }
    </script>
</body>
</html>
