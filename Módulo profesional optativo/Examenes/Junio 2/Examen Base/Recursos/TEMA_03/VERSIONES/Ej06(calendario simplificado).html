<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calendario Simple</title>
</head>
<body>
    <h2>Generador de Calendario 2025</h2>
    <div id="calendario"></div>

    <script>
        // Array bidimensional con los días festivos de cada mes (0-11)
        // Ejemplo: [1,6] en enero significa que el 1 y 6 de enero son festivos
        var festivos = [[1,6],[],[],[17,18,23],[1],[],[],[15],[],[12],[1],[6,8,25]];
        // Constante del año a mostrar
        const ANIO = 2025;

        // Solicita al usuario el número del mes (1-12)
        let inputMes = prompt("Introduce el número del mes (1-12):");
        // Convierte a entero y resta 1 para usar como índice de array (0-11)
        let mes = parseInt(inputMes) - 1;

        // Valida que el mes esté en el rango válido (0-11)
        if (isNaN(mes) || mes < 0 || mes > 11) {
            alert("Mes no válido. Introduce un número entre 1 y 12.");
        } else {
            // Crea una fecha para el primer día del mes solicitado
            let fecha = new Date(ANIO, mes, 1);
            // Obtiene el nombre del mes en español usando toLocaleString
            let nombreMes = fecha.toLocaleString('es-ES', { month: 'long' });
            // Calcula el día de la semana del primer día del mes (0=Lunes, 6=Domingo)
            // (getDay() + 6) % 7 convierte de formato JS (0=Domingo) a formato europeo (0=Lunes)
            let diaSemanaInicio = (fecha.getDay() + 6) % 7;
            // Obtiene el total de días del mes usando el último día del mes
            let totalDiasMes = new Date(ANIO, mes + 1, 0).getDate();

            // Crea el encabezado con el nombre del mes y año en mayúsculas
            let html = `<h2>${nombreMes.toUpperCase()} ${ANIO}</h2>`;
            // Inicializa la tabla
            html += "<table border='1'>";
            
            // Crea la fila de encabezados con los días de la semana
            html += "<thead><tr>";
            const diasSemana = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
            for (let dia of diasSemana) {
                html += `<th>${dia}</th>`;
            }
            html += "</tr></thead>";

            // Comienza el cuerpo de la tabla
            html += "<tbody><tr>";

            // Variable para contar el día actual que se está mostrando
            let diaActual = 1;

            // Añade celdas vacías hasta el primer día del mes
            for (let i = 0; i < diaSemanaInicio; i++) {
                html += "<td></td>";
            }

            // Controla la posición en la semana actual (0-6)
            let diaSemanaActual = diaSemanaInicio;
            // Bucle que recorre todos los días del mes
            while (diaActual <= totalDiasMes) {
                // Verifica si el día actual es festivo consultando el array festivos
                let esFestivo = festivos[mes].includes(diaActual);
                
                // Si es festivo, lo muestra en rojo y negrita
                if (esFestivo) {
                    html += `<td style='color:red; font-weight:bold'>${diaActual}</td>`;
                } else {
                    // Si no es festivo, lo muestra normalmente
                    html += `<td>${diaActual}</td>`;
                }

                // Avanza al siguiente día
                diaActual++;
                // Avanza la posición en la semana
                diaSemanaActual++;

                // Si llegamos al final de la semana (7 días), cierra la fila y abre una nueva
                if (diaSemanaActual === 7) {
                    html += "</tr><tr>";
                    // Reinicia el contador de posición en la semana
                    diaSemanaActual = 0;
                }
            }

            // Rellena las celdas vacías al final del mes (si la última semana no está completa)
            while (diaSemanaActual < 7 && diaSemanaActual !== 0) {
                html += "<td></td>";
                diaSemanaActual++;
            }

            // Cierra la tabla
            html += "</tr></tbody></table>";
            // Inserta el calendario generado en el elemento con id="calendario"
            document.getElementById("calendario").innerHTML = html;
        }
    </script>
</body>
</html>
