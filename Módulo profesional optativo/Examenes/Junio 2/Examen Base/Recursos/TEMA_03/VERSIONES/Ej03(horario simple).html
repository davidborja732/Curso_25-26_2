<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Horario Escolar</title>
    <style>

        td {
            width: 150px;
        }

    </style>
</head>
<!--Horario Semanal-->
<body>
    <h2>Mi Horario Semanal</h2>
    <div id="horario"></div>

    <script>
        // Array bidimensional que contiene las asignaturas de cada día
        // Cada subarray representa el horario de un día (5 horas)
        var horario = [
            ["Matemáticas", "Lengua", "Inglés", "Educación Física", "Historia"],
            ["Física", "Química", "Matemáticas", "Inglés", "Lengua"],
            ["Inglés", "Historia", "Matemáticas", "Física", "Química"],
            ["Lengua", "Matemáticas", "Educación Física", "Historia", "Inglés"],
            ["Química", "Física", "Lengua", "Matemáticas", "Historia"]
        ];

        // Array con los nombres de los días de la semana
        var dias = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes"];
        // Array con los horarios de cada clase
        var horas = ["8:00-9:00", "9:00-10:00", "10:00-11:00", "11:30-12:30", "12:30-13:30"];

        // Inicializa la tabla HTML
        let html = "<table border='1'>";
        
        // Construye la cabecera: primera columna para "Hora" y luego cada día
        html += "<tr><th>Hora</th>";
        // Itera sobre los días y los añade como encabezados
        for (let dia of dias) {
            html += `<th>${dia}</th>`;
        }
        html += "</tr>";

        // Construye las filas del horario (una por cada hora)
        for (let i = 0; i < horas.length; i++) {
            // Comienza la fila con la hora en negrita
            html += `<tr><td><b>${horas[i]}</b></td>`;
            // Para cada día, obtiene la asignatura de esa hora
            for (let j = 0; j < dias.length; j++) {
                // horario[j][i] accede a la asignatura: j=día, i=hora
                html += `<td>${horario[j][i]}</td>`;
            }
            // Cierra la fila
            html += "</tr>";
        }
        
        // Cierra la tabla
        html += "</table>";
        // Inserta el HTML generado en el elemento con id="horario"
        document.getElementById("horario").innerHTML = html;
    </script>
</body>
</html>
