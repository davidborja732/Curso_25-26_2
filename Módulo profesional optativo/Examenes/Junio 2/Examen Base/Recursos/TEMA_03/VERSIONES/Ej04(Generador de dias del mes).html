<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Días del Mes</title>
</head>
<body>
    <h2>Cuántos días tiene el mes</h2>
    <div id="resultado"></div>

    <script>
        // Array con los nombres de los 12 meses del año
        var meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
                     "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        // Solicita al usuario el número del mes y lo convierte a entero
        let numMes = parseInt(prompt("Introduce el número del mes (1-12):"));
        
        // Valida que el número esté entre 1 y 12
        if (isNaN(numMes) || numMes < 1 || numMes > 12) {
            alert("Mes no válido");
        } else {
            // Solicita el año para calcular correctamente los días (incluye años bisiestos)
            let anio = parseInt(prompt("Introduce el año:"));
            
            // Calcula los días del mes usando el objeto Date
            // new Date(año, mes, 0) obtiene el último día del mes anterior
            // .getDate() devuelve el número de días del mes
            let dias = new Date(anio, numMes, 0).getDate();
            // Obtiene el nombre del mes del array (numMes - 1 porque los arrays empiezan en 0)
            let nombreMes = meses[numMes - 1];

            // Crea el encabezado con el mes, año y cantidad de días
            let html = `<h3>${nombreMes} de ${anio} tiene ${dias} días</h3>`;
            // Inicializa la tabla
            html += "<table border='1'><tr>";
            
            // Itera del 1 al número de días del mes
            for (let i = 1; i <= dias; i++) {
                // Añade cada día como una celda
                html += `<td>${i}</td>`;
                // Si el número de días es múltiplo de 7 (fin de semana), cierra la fila y comienza una nueva
                if (i % 7 === 0) {
                    html += "</tr><tr>";
                }
            }
            
            // Cierra la última fila y la tabla
            html += "</tr></table>";
            // Inserta el HTML generado en el elemento con id="resultado"
            document.getElementById("resultado").innerHTML = html;
        }
    </script>
</body>
</html>
