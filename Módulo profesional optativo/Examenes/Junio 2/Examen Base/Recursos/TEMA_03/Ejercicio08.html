<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio08</title>
</head>

<!--Crear un script que solicite el nombre y apellidos de una persona (en una sola vez) y
luego los muestre como “apellidos, nombre”. -->

<body>
    <h1>Ejercicio 8</h1>

    <script>

        function formatearNombre(nombreCompleto){

            //Divido el nombre por espacios
            const partes = nombreCompleto.trim().split(" ");
            //El primer elemento es el nombre
            const nombre = partes[0];
            //El resto son los apellidos
            const apellidos = partes.slice(1).join(" ");
            
            return `${apellidos}, ${nombre}`;
        }

        //Solicito un nombre completo al usuario
        const nomCompleto = prompt("Introduce tu nombre y apellidos:");

        if(nomCompleto !== null && nomCompleto.trim() !== ""){
            const resultado = formatearNombre(nomCompleto);
            alert(`Formato: ${resultado}`);
            console.log(resultado);
            document.writeln(resultado);
        }else{
            alert("No se ha introducido ningun nombre");
        }

    </script>
</body>
</html>
