<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rick and Morty API - Práctica Fetch</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #202329;
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #00b5cc;
    }
    #characters {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    .card {
      background-color: #2c2f36;
      border-radius: 10px;
      overflow: hidden;
      width: 200px;
      cursor: pointer;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }
    .card:hover {
      transform: scale(1.05);
    }
    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .card h3 {
      text-align: center;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h1>Personajes de Rick and Morty</h1>
  <div id="characters"></div>

  <script>
    const apiURL = "https://rickandmortyapi.com/api/character";

    // Obtener personajes
    fetch(apiURL)
      .then(response => response.json())
      .then(data => {
        const personajes = data.results;
        const container = document.getElementById("characters");

        personajes.forEach(personaje => {
          const card = document.createElement("div");
          card.className = "card";

          const img = document.createElement("img");
          img.src = personaje.image;

          const name = document.createElement("h3");
          name.textContent = personaje.name;

          card.appendChild(img);
          card.appendChild(name);

          // Al pulsar → crear socio
          card.addEventListener("click", () => post(personaje));

          container.appendChild(card);
        });
      });

    function post(personaje){

      const dni = prompt("Introduce un DNI:");
      const nombre = personaje.name;
      const apellidos = "Aznar"; // constante obligatoria

      // VALIDACIÓN DE CAMPOS
      let errores = [];

      if (!dni) errores.push("DNI");
      if (!nombre) errores.push("Nombre");
      if (!apellidos) errores.push("Apellidos");

      if (errores.length > 0) {
        alert("Faltan los siguientes campos: " + errores.join(", "));
        return;
      }

      const datos = JSON.stringify({
        dni: dni,
        nombre: nombre,
        apellidos: apellidos
      });

      console.log("Enviando socio:", datos);
      
      fetch("http://192.168.50.120:8069/socio?data=" + datos, {
        method: "POST"
      })
      /*fetch("http://192.168.50.120:8069/socio?data=" + datos, {
        method: "POST"
      })*/
      .then(response => response.json())
      .then(data => {
        console.log("Respuesta servidor:", data);

        // Detectar si el servidor devuelve error de DNI duplicado
        if (data.error && data.error.includes("dni")) {
          alert("❌ Error: ya existe un socio con ese DNI");
          return;
        }

        alert("✔ Socio creado correctamente");
      })
      .catch(error => {
        console.error("Error:", error);
        alert("❌ Error al crear el socio (posible DNI duplicado)");
      });
    }
  </script>
</body>
</html>
